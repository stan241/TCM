version: 1
applications:
  - frontend:
      phases:
        preBuild:
          commands:
            - npm ci
        build:
          commands:
            - npm run build --workspace=apps/portal
      artifacts:
        baseDirectory: apps/portal/.next
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*
          - apps/portal/.next/cache/**/*
    appRoot: .
